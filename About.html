<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About | Maja Johanna</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background: #f8f6f2;
      color: #2f2a26;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      position: relative;
      padding: 40px 30px 20px;
      border-bottom: 1px solid #d8d1c7;
    }

    .site-title {
      text-align: center;
      font-size: 3rem;
      font-weight: 400;
      letter-spacing: 1px;
    }

    nav {
      position: absolute;
      top: 45px;
      right: 30px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    nav a {
      text-decoration: none;
      color: #2f2a26;
      font-size: 1rem;
      transition: opacity 0.2s ease;
    }

    nav a:hover {
      opacity: 0.6;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px 20px;
    }

    .content-frame {
      width: min(900px, 90vw);
      border: 1px solid #d8d1c7;
      background: white;
      padding: 32px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
      line-height: 1.7;
      color: #5b5148;
    }

    .content-frame h2 {
      color: #2f2a26;
      margin-bottom: 16px;
      font-size: 1.8rem;
      font-weight: 400;
    }

    .content-frame p + p {
      margin-top: 12px;
    }

    footer {
      text-align: center;
      font-size: 0.9rem;
      color: #7a7067;
      padding: 20px;
    }

    @media (max-width: 768px) {
      header {
        padding-top: 30px;
      }

      .site-title {
        font-size: 2.2rem;
      }

      nav {
        position: static;
        margin-top: 20px;
      }

      nav ul {
        justify-content: center;
      }

      .content-frame {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1 class="site-title">Maja Johanna</h1>

    <nav>
      <ul>
        <li><a href="About.html">About</a></li>
        <li><a href="index.html#gallery">Gallery</a></li>
        <li><a href="Shop.html">Shop</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="content-frame" id="about">
      <h2>About</h2>
      <p>
    Här kommer mer info
      </p>
    </section>
  </main>

  <footer>
    Senast uppdaterad 2026-04-20
  </footer>
</body>
</html>
